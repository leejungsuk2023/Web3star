# OAuth 콜백 페이지를 GitHub Pages에 배포 (에뮬레이터 Google 로그인용)
name: Deploy Web app to GitHub Pages # pages deploy pipeline

on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'public/**'
      - 'docs/**'
      - 'scripts/**'
      - 'android/web3star-launcher-source.png'
      - 'package.json'
      - 'package-lock.json'
      - 'vite.config.ts'
      - 'index.html'
      - '.github/workflows/deploy-oauth-callback.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Regenerate PWA & maskable icons from source PNG
        run: npm run icons:generate

      # web3star.org 처럼 커스텀 도메인이 사이트 루트(/)이면 base는 반드시 '/' 여야 함.
      # 그렇지 않으면 HTML이 /Web3star/assets/... 를 요청해 JS 404 → 홈·/admin 모두 흰 화면·접속 불가.
      # GitHub 기본 URL https://<user>.github.io/<repo>/ 만 쓸 때: Repo → Settings → Variables →
      # PAGES_BASE 값을 /Web3star/ 처럼 저장소 경로(앞뒤 슬래시 포함)로 설정.
      - name: Build web app
        shell: bash
        env:
          VITE_DEPLOY_TARGET: web
          PAGES_BASE: ${{ vars.PAGES_BASE }}
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          VITE_OAUTH_CALLBACK_URL: ${{ secrets.VITE_OAUTH_CALLBACK_URL }}
          VITE_GOOGLE_WEB_CLIENT_ID: ${{ secrets.VITE_GOOGLE_WEB_CLIENT_ID }}
          REPO_NAME: ${{ github.event.repository.name }}
        run: |
          set -e
          if [ -n "${PAGES_BASE}" ]; then
            BASE="${PAGES_BASE}"
          else
            BASE="/"
          fi
          echo "Vite base: ${BASE}"
          npx vite build --base "${BASE}"

      - name: Setup Pages
        uses: actions/configure-pages@v4
        with:
          enablement: true

      - name: SPA fallback for GitHub Pages
        run: cp dist/index.html dist/404.html

      # 일부 환경에서 /admin, /privacy 등 직접 URL이 404만 반환하는 경우 대비(물리 경로로 200 가능)
      - name: SPA deep paths (admin, privacy)
        shell: bash
        run: |
          mkdir -p dist/admin dist/privacy
          cp dist/index.html dist/admin/index.html
          cp dist/index.html dist/privacy/index.html

      - name: Upload artifact (dist)
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
