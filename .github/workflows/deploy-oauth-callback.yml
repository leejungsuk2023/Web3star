# OAuth 콜백 페이지를 GitHub Pages에 배포 (에뮬레이터 Google 로그인용)
name: Deploy OAuth callback to GitHub Pages

on:
  push:
    branches: [main]
    paths: ['public/oauth-callback.html']
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact (public folder only)
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
